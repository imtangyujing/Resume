    const MOBILE_MODE_BREAKPOINT = 1024;
    const target = 'index.html#mobile-portfolio';

<style>
    body { background-color: #faf9f8; position: relative; overflow-x: hidden; }
    body::after {
      content: "";
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; opacity: 0.03; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
    .perspective-container { perspective: 2000px; scroll-behavior: smooth; }
    .gallery-track {
      display: flex; gap: 0;
      transition: transform 1.02s cubic-bezier(0.2, 0.88, 0.24, 1);
      transform-style: preserve-3d;
    }
    .paper-fold {
      transform-style: preserve-3d; flex-shrink: 0;
      transition: transform 0.92s cubic-bezier(0.2, 0.82, 0.22, 1), opacity 0.78s ease, box-shadow 0.78s ease;
      transform-origin: left center;
    }
    .paper-fold:nth-child(odd) { transform: rotateY(6deg); }
    .paper-fold:nth-child(even) { transform: rotateY(-6deg); }
    .paper-fold:hover {
      transform: rotateY(0deg) scale(1.03) translateZ(30px) !important;
      z-index: 50;
      box-shadow: 20px 40px 60px rgba(26, 28, 28, 0.08);
    }
    .paper-fold-link {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      row-gap: 28px;
      height: 100%;
      color: inherit;
      text-decoration: none;
    }
    .paper-fold-link:focus-visible {
      outline: 2px solid rgba(0,0,0,0.75);
      outline-offset: 6px;
    }
    /* Folding away animation */
    .paper-fold.folding-out {
      transform: perspective(800px) rotateY(-70deg) scale(0.85) !important;
      opacity: 0.3;
      pointer-events: none;
    }
    .paper-fold.folding-in {
      transform: perspective(800px) rotateY(70deg) scale(0.85) !important;
      opacity: 0.3;
      pointer-events: none;
    }
    .ink-blot { filter: url(#inkFilter); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    /* Gallery arrow buttons */
    .gallery-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 60;
      width: 62px;
      height: 62px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 9999px;
      color: #111111;
      cursor: pointer;
      transition: transform 0.25s ease, background-color 0.25s ease, color 0.25s ease, opacity 0.25s ease;
      box-shadow: 0 10px 24px rgba(26, 28, 28, 0.05);
    }
    .gallery-arrow:hover {
      transform: translateY(-50%) scale(1.03);
      background: rgba(0,0,0,0.88);
      color: white;
    }
    .gallery-arrow:disabled {
      opacity: 0.22;
      pointer-events: none;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.55);
      color: #111111;
    }
    .gallery-arrow.left { left: 18px; }
    .gallery-arrow.right { right: 18px; }
    /* Topbar Wizard */
    #nav-wizard {
      position: absolute; z-index: 60;
      transition: left 1s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    #nav-wizard .wizard-body { animation: wizWalk 0.35s ease-in-out infinite alternate; }
    #nav-wizard.idle .wizard-body { animation: wizIdle 2s ease-in-out infinite; }
    @keyframes wizWalk {
      0% { transform: translateY(0) rotate(-2deg); }
      100% { transform: translateY(-2px) rotate(2deg); }
    }
    @keyframes wizIdle {
      0%,100% { transform: translateY(0) rotate(0deg); }
      30% { transform: translateY(-1px) rotate(2deg); }
      60% { transform: translateY(0.5px) rotate(-1.5deg); }
    }
    .wizard-wand { transform-origin: 20% 90%; }
    #nav-wizard.poking .wizard-wand { animation: wandPoke 0.5s ease-in-out; }
    @keyframes wandPoke {
      0%   { transform: rotate(0deg); }
      30%  { transform: rotate(-40deg) translateY(-3px); }
      50%  { transform: rotate(-45deg) translateY(-5px); }
      70%  { transform: rotate(-20deg) translateY(-2px); }
      100% { transform: rotate(0deg); }
    }
    /* Spell casting — wand swirls dramatically */
    #nav-wizard.casting .wizard-wand {
      animation: wandCast 1.2s ease-in-out;
    }
    @keyframes wandCast {
      0%   { transform: rotate(0deg); }
      15%  { transform: rotate(-50deg) translateY(-6px); }
      30%  { transform: rotate(-30deg) translateY(-3px) scale(1.1); }
      50%  { transform: rotate(-60deg) translateY(-8px) scale(1.15); }
      70%  { transform: rotate(-20deg) translateY(-2px); }
      85%  { transform: rotate(-45deg) translateY(-5px); }
      100% { transform: rotate(0deg); }
    }
    /* Wand point gesture — tilt body to hint direction */
    #nav-wizard.point-right { transform: translateY(-50%) rotate(5deg); }
    #nav-wizard.point-left  { transform: translateY(-50%) rotate(-5deg); }
    /* Bubble BELOW wizard on sub-pages */
    #wiz-bubble {
      position: absolute; top: calc(100% + 2px); left: 50%; transform: translateX(-50%);
      white-space: nowrap; background: #000; color: #fff; font-size: 10px;
      font-family: 'Space Grotesk', sans-serif; padding: 4px 10px; border-radius: 9999px;
      opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
    }
    #wiz-bubble::after {
      content: ''; position: absolute; top: -3px; left: 50%;
      transform: translateX(-50%) rotate(45deg); width: 6px; height: 6px; background: #000;
    }
    /* Page dots */
    .page-dots { display: flex; gap: 8px; justify-content: center; margin-top: 24px; }
    .page-dot {
      width: 24px; height: 2px; background: rgba(0,0,0,0.15);
      transition: all 0.4s ease; cursor: pointer;
    }
    .page-dot.active { background: rgba(0,0,0,0.8); width: 40px; }
    [data-hydration-state="pending"] {
      opacity: 0;
      visibility: hidden;
    }
    [data-hydration-state="ready"] {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.18s ease;
    }
    .portfolio-cover-frame {
      width: 100%;
      margin-top: auto;
      margin-bottom: auto;
      transform: translateY(-22px);
      overflow: hidden;
      background: transparent;
    }
    .portfolio-card-head {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }
    .portfolio-card-title {
      min-height: 80px;
      max-height: calc(2 * 1.18em);
      line-height: 1.18;
      overflow: hidden;
    }
    .portfolio-title-text,
    .portfolio-title-solid,
    .portfolio-title-fade {
      display: inline;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .portfolio-title-fade {
      background: linear-gradient(90deg, rgba(23,18,13,0.96) 0%, rgba(23,18,13,0.14) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .portfolio-cover-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: var(--cover-position, center center);
      transform: scale(var(--cover-scale, 1.16));
      transform-origin: center center;
      filter: none;
      mix-blend-mode: multiply;
      transition: transform 0.45s ease;
    }
    .paper-fold:hover .portfolio-cover-image {
      transform: scale(calc(var(--cover-scale, 1.16) + 0.04));
    }
</style>

<script>
    const track = document.getElementById('gallery-track');
    const arrowLeft = document.getElementById('arrow-left');
    const arrowRight = document.getElementById('arrow-right');
    const dotsContainer = document.getElementById('page-dots');
    const CARDS_PER_PAGE = 4;
    const CARD_WIDTH = 320; // px per card
    const CARD_GAP = 0;
    const FOLD_OUT_STAGGER = 0.085;
    const FOLD_IN_STAGGER = 0.11;
    const FOLD_PHASE_MS = 460;
    const UNLOCK_MS = 860;
    let currentPage = 0;
    let isAnimating = false;
    let activeCategory = 'article';
    async function fetchContentFromSource(apiPath, staticPath, rootKey) {
      try {
        const response = await fetch(apiPath);
        if (response.ok) {
          const payload = await response.json();
          return payload.content || payload;
        }
      } catch (error) {
        console.warn(`Falling back from ${apiPath}:`, error);
      }

      const fallbackResponse = await fetch(staticPath);
      if (!fallbackResponse.ok) {
        throw new Error(`Failed to load fallback content from ${staticPath}`);
      }

      const fallbackPayload = await fallbackResponse.json();
      return fallbackPayload[rootKey] || fallbackPayload.content || fallbackPayload;
    }

    async function fetchPortfolioCards() {
      try {
        const response = await fetch('api/portfolio/cards');
        if (response.ok) {
          const payload = await response.json();
          return payload.cards || [];
        }
      } catch (error) {
        console.warn('Falling back from api/portfolio/cards:', error);
      }

      const fallbackResponse = await fetch('data/portfolio-cards.json');
      if (!fallbackResponse.ok) {
        throw new Error('Failed to load fallback portfolio cards');
      }

      const fallbackPayload = await fallbackResponse.json();
      return fallbackPayload.cards || [];
    }

    let portfolioCards = [];
    let totalPages = 1;

    function getVisibleCards() {
      return portfolioCards.filter((card) => card.category === activeCategory);
    }

    function getCardNodes() {
      return Array.from(document.querySelectorAll('.paper-fold'));
    }

    function rebuildDots() {
      dotsContainer.innerHTML = '';
      for (let i = 0; i < totalPages; i++) {
        const dot = document.createElement('div');
        dot.className = 'page-dot' + (i === currentPage ? ' active' : '');
        dot.addEventListener('click', () => goToPage(i));
        dotsContainer.appendChild(dot);
      }
    }

    function goToPage(page) {
      if (isAnimating || page === currentPage || page < 0 || page >= totalPages) return;
      const cards = getCardNodes();
      isAnimating = true;
      const direction = page > currentPage ? 'right' : 'left';
      const oldPage = currentPage;
      currentPage = page;

      // Step 1: Fold current cards shut (staggered)
      const oldStart = oldPage * CARDS_PER_PAGE;
      const oldEnd = Math.min(oldStart + CARDS_PER_PAGE, cards.length);
      for (let i = oldStart; i < oldEnd; i++) {
        const delay = direction === 'right'
          ? (i - oldStart) * FOLD_OUT_STAGGER
          : (oldEnd - 1 - i) * FOLD_OUT_STAGGER;
        cards[i].style.transitionDelay = `${delay}s`;
        cards[i].classList.add(direction === 'right' ? 'folding-out' : 'folding-in');
      }

      // Step 2: After fold, slide track and unfold new cards
      setTimeout(() => {
        // Slide track
        const offset = currentPage * CARDS_PER_PAGE * (CARD_WIDTH + CARD_GAP);
        track.style.transform = `translateX(-${offset}px)`;

        // Clear old folds
        for (let i = oldStart; i < oldEnd; i++) {
          cards[i].style.transitionDelay = '0s';
          cards[i].classList.remove('folding-out', 'folding-in');
        }

        // Pre-fold new cards, then unfold with stagger
        const newStart = currentPage * CARDS_PER_PAGE;
        const newEnd = Math.min(newStart + CARDS_PER_PAGE, cards.length);
        for (let i = newStart; i < newEnd; i++) {
          cards[i].style.transitionDelay = '0s';
          cards[i].classList.add(direction === 'right' ? 'folding-in' : 'folding-out');
        }

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            for (let i = newStart; i < newEnd; i++) {
              const delay = direction === 'right'
                ? (i - newStart) * FOLD_IN_STAGGER
                : (newEnd - 1 - i) * FOLD_IN_STAGGER;
              cards[i].style.transitionDelay = `${delay}s`;
              cards[i].classList.remove('folding-out', 'folding-in');
            }
          });
        });

        setTimeout(() => { isAnimating = false; }, UNLOCK_MS);
      }, FOLD_PHASE_MS);

      // Update UI
      arrowLeft.disabled = currentPage === 0;
      arrowRight.disabled = currentPage === totalPages - 1;
      document.querySelectorAll('.page-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentPage);
      });
    }

    arrowRight.addEventListener('click', () => goToPage(currentPage + 1));
    arrowLeft.addEventListener('click', () => goToPage(currentPage - 1));

    window.addEventListener('resize', () => {
      window.clearTimeout(window.__portfolioTitleClampTimer);
      window.__portfolioTitleClampTimer = window.setTimeout(() => {
        applyTitleClamp();
      }, 80);
    });

    document.addEventListener('keydown', (event) => {
      const target = event.target;
      const tagName = target?.tagName?.toLowerCase?.() || '';
      const isTypingTarget =
        target?.isContentEditable ||
        tagName === 'input' ||
        tagName === 'textarea' ||
        tagName === 'select';

      if (isTypingTarget) return;

      if (event.key === 'ArrowRight') {
        event.preventDefault();
        goToPage(currentPage + 1);
      }

      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        goToPage(currentPage - 1);
      }
    });

    async function loadPortfolioCards() {
      const revealPortfolio = () => {
        [track, arrowLeft, arrowRight, dotsContainer].forEach((node) => {
          if (node) node.dataset.hydrationState = 'ready';
        });
        scheduleTitleClamp();
      };

      try {
        portfolioCards = (await fetchPortfolioCards()).filter((card) => card.category === 'article');
        renderCards();
      } catch (error) {
        console.error(error);
        renderCards();
      } finally {
        revealPortfolio();
      }
    }

    function renderCards() {
      const cards = getVisibleCards();
      totalPages = Math.max(1, Math.ceil(cards.length / CARDS_PER_PAGE));
      currentPage = Math.min(currentPage, totalPages - 1);
      track.innerHTML = cards.map((card, index) => renderCard(card, index)).join('');
      track.style.transform = `translateX(-${currentPage * CARDS_PER_PAGE * (CARD_WIDTH + CARD_GAP)}px)`;
      rebuildDots();
      arrowLeft.disabled = currentPage === 0;
      arrowRight.disabled = totalPages <= 1 || currentPage === totalPages - 1;
      if (track.dataset.hydrationState === 'ready') {
        scheduleTitleClamp();
      }
    }

    function renderCard(card, index) {
      const backgroundStyle = index % 2 === 0
        ? 'background:#ffffff;box-shadow:-10px 0 20px rgba(0,0,0,0.02);'
        : 'background:#fcfbfb;box-shadow:-10px 0 20px rgba(0,0,0,0.03);';
      const primaryIcon = card.primaryMetric?.icon || 'favorite';
      const primaryValue = card.primaryMetric?.value || 'N/A';
      const secondaryValue = card.secondaryMetric || formatStatusTime(card.refreshedAt);
      const coverPosition = card.coverPosition || 'center center';
      const coverScale = Number(card.coverScale || 1.16);
      const href = card.linkUrl && card.linkUrl !== '#' ? card.linkUrl : 'javascript:void(0)';
      const linkAttrs = card.linkUrl && card.linkUrl !== '#'
        ? 'target="_blank" rel="noreferrer"'
        : 'aria-disabled="true"';

      return `
      <article class="paper-fold relative p-12 flex flex-col justify-between border-l border-y border-outline-variant/20" style="width:${CARD_WIDTH}px;${backgroundStyle}">
        <a class="paper-fold-link" href="${escapeHtml(href)}" ${linkAttrs}>
          <div class="portfolio-card-head">
            <span class="font-mono text-[10px] uppercase tracking-widest opacity-40">${escapeHtml(card.kicker)}</span>
            <h2 class="portfolio-card-title font-headline text-2xl italic text-on-surface" data-full-title="${escapeHtml(card.title)}">${escapeHtml(card.title)}</h2>
            <div class="portfolio-cover-frame aspect-[3/4]">
              <img alt="${escapeHtml(card.title)}" class="portfolio-cover-image" src="${escapeHtml(card.imageUrl)}" style="--cover-position:${escapeHtml(coverPosition)};--cover-scale:${escapeHtml(coverScale)};" />
            </div>
          </div>
          <div class="flex justify-between items-center font-mono text-[10px] tracking-widest opacity-60">
            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-xs">${escapeHtml(primaryIcon)}</span> ${escapeHtml(primaryValue)}</span>
            <span>${escapeHtml(secondaryValue)}</span>
          </div>
        </a>
      </article>`;
    }

    function formatStatusTime(value) {
      if (!value) return 'LIVE';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value).toUpperCase();
      return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }).toUpperCase();
    }

    function applyTitleClamp() {
      document.querySelectorAll('.portfolio-card-title').forEach((titleEl) => {
        const fullTitle = titleEl.dataset.fullTitle || titleEl.textContent || '';
        titleEl.innerHTML = `<span class="portfolio-title-text">${escapeHtml(fullTitle)}</span>`;

        if (titleEl.scrollHeight <= titleEl.clientHeight + 1) {
          return;
        }

        let low = 0;
        let high = fullTitle.length;
        let best = '';

        while (low <= high) {
          const mid = Math.floor((low + high) / 2);
          const candidate = fullTitle.slice(0, mid).trimEnd();
          titleEl.innerHTML = buildTruncatedTitleMarkup(candidate);

          if (titleEl.scrollHeight <= titleEl.clientHeight + 1) {
            best = candidate;
            low = mid + 1;
          } else {
            high = mid - 1;
          }
        }

        titleEl.innerHTML = buildTruncatedTitleMarkup(best || fullTitle.slice(0, 1));
      });
    }

    function scheduleTitleClamp() {
      const runClamp = () => {
        window.requestAnimationFrame(() => {
          window.requestAnimationFrame(() => {
            applyTitleClamp();
          });
        });
      };

      runClamp();

      if (document.fonts?.ready) {
        document.fonts.ready.then(() => {
          runClamp();
        });
      }
    }

    function buildTruncatedTitleMarkup(value) {
      const text = String(value || '').trimEnd();
      const fadeChars = Math.min(4, Math.max(1, text.length));
      const solidText = text.slice(0, -fadeChars);
      const fadeText = text.slice(-fadeChars);
      const solidMarkup = solidText ? `<span class="portfolio-title-solid">${escapeHtml(solidText)}</span>` : '';
      return `${solidMarkup}<span class="portfolio-title-fade">${escapeHtml(fadeText)}...</span>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    loadPortfolioCards();

    // === Topbar Wizard ===
    (() => {
      const wizard = document.getElementById('nav-wizard');
      const bubble = document.getElementById('wiz-bubble');
      const fig = document.getElementById('wiz-figure');
      const nav = wizard.parentElement;
      let chatTimer = null;
      let isCasting = false;
      const pendingTimers = new Set();

      function schedule(fn, delay) {
        const timer = window.setTimeout(() => {
          pendingTimers.delete(timer);
          fn();
        }, delay);
        pendingTimers.add(timer);
        return timer;
      }

      function clearPendingTimers() {
        pendingTimers.forEach((timer) => window.clearTimeout(timer));
        pendingTimers.clear();
      }

      function getLinkCenter(selector) {
        const el = nav.querySelector(selector);
        if (!el) return 200;
        const r = el.getBoundingClientRect();
        const nr = nav.getBoundingClientRect();
        return r.left + r.width / 2 - nr.left - 14;
      }
      function say(text) {
        bubble.style.opacity = '0';
        schedule(() => { bubble.textContent = text; bubble.style.opacity = '1'; }, 200);
      }
      function hideBubble() { bubble.style.opacity = '0'; }
      function moveTo(x) { wizard.classList.remove('idle'); wizard.style.left = x + 'px'; }
      function idle() { wizard.classList.add('idle'); }
      function poke() { wizard.classList.add('poking'); schedule(() => wizard.classList.remove('poking'), 500); }
      function face(dir) { fig.style.transform = dir < 0 ? 'scaleX(-1)' : 'scaleX(1)'; }
      function pointDir(dir) {
        wizard.classList.remove('point-right','point-left');
        if (dir > 0) wizard.classList.add('point-right');
        else if (dir < 0) wizard.classList.add('point-left');
      }
      function clearPoint() { wizard.classList.remove('point-right','point-left'); }

      // Conversation lines — configurable from /api/wizard/content
      const defaultChatLines = [
        { text: "欢迎来到作品集！", action: 'idle' },
        { text: "← → 箭头翻页，悬停看细节噢~", action: 'idle' },
        { text: "每张卡片都是精心制作的～", action: 'idle' },
        { text: "对了，我的经历也很精彩的…👉", action: 'point', target: 'a[href="experience.html"]' },
        { text: "试试把鼠标放在卡片上看看？", action: 'idle' },
        { text: "这些作品花了不少心思呢", action: 'idle' },
        { text: "喂喂，经历也看看呗？确定不看？", action: 'point', target: 'a[href="experience.html"]' },
        { text: "偷窥狂…光看作品不看人的？", action: 'idle' },
        { text: "好了好了，去看看我的经历吧～", action: 'point', target: 'a[href="experience.html"]' },
        { text: "好吧好吧，你慢慢看…", action: 'idle' },
      ];
      const defaultCastLines = ["阿布拉卡达布拉…✨", "嗖～传送启动！"];
      let chatLines = [...defaultChatLines];
      let castLines = [...defaultCastLines];
      const sequenceLineDelay = 4000;
      const sequenceReturnDelay = 2500;

      let lineIdx = 0;
      function collectPointSequence(startIndex, target) {
        const sequence = [];
        let cursor = startIndex;

        while (cursor < chatLines.length) {
          const current = chatLines[cursor];
          if (current.action !== 'point' || current.target !== target) break;
          sequence.push(current);
          cursor += 1;
        }

        return sequence;
      }

      function nextChat() {
        if (isCasting || lineIdx >= chatLines.length) return;
        const line = chatLines[lineIdx];
        lineIdx++;

        if (line.action === 'point' && line.target) {
          const sequence = collectPointSequence(lineIdx - 1, line.target);
          lineIdx = lineIdx - 1 + sequence.length;
          const pos = getLinkCenter(line.target);
          const curLeft = parseFloat(wizard.style.left) || 0;
          face(pos > curLeft ? 1 : -1);
          moveTo(pos);
          schedule(() => {
            idle();
            poke();
            pointDir(pos > curLeft ? 1 : -1);
            sequence.forEach((item, index) => {
              schedule(() => {
                say(item.text);
              }, index * sequenceLineDelay);
            });
            schedule(() => {
              clearPoint();
              const homePos = getLinkCenter('a[href="works.html"]');
              face(homePos < pos ? -1 : 1);
              moveTo(homePos);
              schedule(() => { idle(); face(1); }, 1000);
            }, Math.max(sequenceReturnDelay, ((sequence.length - 1) * sequenceLineDelay) + sequenceReturnDelay));
          }, 1000);
          chatTimer = schedule(nextChat, 1000 + Math.max(sequenceReturnDelay, ((sequence.length - 1) * sequenceLineDelay) + sequenceReturnDelay) + 1800);
        } else {
          say(line.text);
          chatTimer = schedule(nextChat, 4000);
        }
      }

      function startWizard() {
        const pos = getLinkCenter('a[href="works.html"]');
        wizard.style.transition = 'none';
        wizard.style.left = pos + 'px';
        face(1); idle();
        requestAnimationFrame(() => { wizard.style.transition = ''; });
        chatTimer = schedule(nextChat, 500);
      }

      async function loadWizardContent() {
        try {
          const wizardContent = await fetchContentFromSource('api/wizard/content', 'data/wizard-content.json', '魔法小人台词');
          const worksContent = wizardContent.works || {};
          if (Array.isArray(worksContent["自动对话"]) && worksContent["自动对话"].length) {
            chatLines = worksContent["自动对话"];
          }
          if (Array.isArray(worksContent["施法文案"]) && worksContent["施法文案"].length >= 2) {
            castLines = worksContent["施法文案"];
          }
        } catch (error) {
          console.error('Failed to hydrate works wizard content:', error);
        }
      }

      schedule(() => {
        loadWizardContent().finally(startWizard);
      }, 300);

      // === Click intercept: spell-cast then navigate ===
      const navLinks = nav.querySelectorAll('a[href]');
      navLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (link.hasAttribute('download')) return;
        if (href === 'works.html') return; // current page
        link.addEventListener('click', function(e) {
          if (isCasting) { e.preventDefault(); return; }
          e.preventDefault();
          isCasting = true;
          clearTimeout(chatTimer);
          clearPendingTimers();
          hideBubble();

          const targetPos = getLinkCenter(`a[href="${href}"]`);
          const curLeft = parseFloat(wizard.style.left) || 0;
          face(targetPos > curLeft ? 1 : -1);
          moveTo(targetPos);

          schedule(() => {
            idle();
            wizard.classList.add('casting');
            say(castLines[0] || defaultCastLines[0]);
            schedule(() => say(castLines[1] || defaultCastLines[1]), 600);
            schedule(() => {
              wizard.classList.remove('casting');
              window.location.href = href;
            }, 1400);
          }, 1000);
        });
      });
    })();
</script>
</body></html>

<script>
  let track = document.getElementById('book-track');
  let spreads = [];
  let pageCards = [];
  const arrowLeft = document.getElementById('arrow-left');
  const arrowRight = document.getElementById('arrow-right');
  const dotsContainer = document.getElementById('book-dots');
  const spreadLabel = document.getElementById('spread-label');
  let experienceItems = [];
  let resizeTimer = null;
  let totalSpreads = 0;
  let currentSpread = 0;
  let focusedPage = 0;
  let isAnimating = false;

  function normalizeParagraphs(value) {
    if (!value) return [];
    if (Array.isArray(value)) {
      return value
        .map((item) => {
          if (item && typeof item === 'object') {
            const text = String(item.text || item['文本'] || '').trim();
            if (!text) return null;
            return {
              text,
              strong: Boolean(item.strong ?? item['加粗']),
              divider: Boolean(item.divider ?? item['分割线']),
            };
          }

          const text = String(item).trim();
          return text ? { text, strong: false, divider: false } : null;
        })
        .filter(Boolean);
    }

    return String(value)
      .split(/\n+/)
      .flatMap((line) => line.split(/(?<=[。！？])/u))
      .map((item) => item.trim())
      .filter(Boolean)
      .map((text) => ({ text, strong: false, divider: false }));
  }

  function getExperienceBlocks(item) {
    const introBlocks = normalizeParagraphs(item['正文']).map((entry) => ({
      kind: 'body',
      text: entry.text,
      strong: entry.strong,
      divider: entry.divider,
    }));
    const detailBlocks = normalizeParagraphs(item['条目']).map((entry) => ({
      kind: 'detail',
      text: entry.text,
      strong: entry.strong,
      divider: entry.divider,
    }));
    return [...introBlocks, ...detailBlocks];
  }

  function renderContentBlocks(blocks) {
    return blocks.map((block, index) => {
      const className = [
        'page-copy-line',
        block.kind === 'detail' ? 'detail' : '',
        block.strong ? 'strong' : '',
      ].filter(Boolean).join(' ');
      const previousText = blocks[index - 1]?.text?.trim();
      const fallbackDivider =
        previousText === '希望我做得还不错。' &&
        block.text.trim().startsWith('乔布斯说，好的产品经理');
      const needsDivider = block.divider || fallbackDivider;

      return `
        <div class="page-copy-row">
          ${needsDivider ? '<div class="page-copy-divider" aria-hidden="true"></div>' : ''}
          <p class="${className}">${escapeHtml(block.text)}</p>
        </div>
      `;
    }).join('');
  }

  function renderTags(tags = []) {
    return tags.map((tag) => `<span class="page-tag">${escapeHtml(tag)}</span>`).join('');
  }

  function buildSignoff(timeAndUnit = '') {
    const [timePartRaw = '', unitPartRaw = ''] = String(timeAndUnit).split('/').map((part) => part.trim());
    const timePart = timePartRaw || '2025.09 - 至今';
    const unitPart = unitPartRaw || 'QbitAI';
    return `
      <div class="page-signoff">
        <p class="page-signoff-line meta">${escapeHtml(timePart)}</p>
        <p class="page-signoff-line brand">${escapeHtml(`We are ${unitPart}`)}</p>
      </div>
    `;
  }

  function splitExperienceContent(item) {
    const allBlocks = getExperienceBlocks(item);
    if (window.innerWidth <= 1023 || allBlocks.length <= 1) {
      return { leftBlocks: allBlocks, rightBlocks: [] };
    }

    const weights = allBlocks.map((block) => block.text.length + (block.kind === 'detail' ? 26 : 0));
    const totalWeight = weights.reduce((sum, weight) => sum + weight, 0);
    const targetWeight = totalWeight * 0.64;
    const minLeftBlocks = Math.min(6, Math.max(1, allBlocks.length - 1));
    const minRightBlocks = Math.min(3, Math.max(1, allBlocks.length - 1));

    let runningWeight = 0;
    let splitIndex = minLeftBlocks;

    for (let index = 0; index < allBlocks.length; index += 1) {
      runningWeight += weights[index];
      const leftCount = index + 1;
      const rightCount = allBlocks.length - leftCount;
      const currentText = allBlocks[index]?.text?.trim() || '';
      const nextText = allBlocks[index + 1]?.text?.trim() || '';
      const cutsDividerPair =
        currentText === '希望我做得还不错。' &&
        nextText.startsWith('乔布斯说，好的产品经理');

      if (leftCount >= minLeftBlocks && rightCount >= minRightBlocks && runningWeight >= targetWeight) {
        if (!cutsDividerPair) {
          splitIndex = leftCount;
          break;
        }
      }
    }

    splitIndex = Math.max(minLeftBlocks, Math.min(splitIndex, allBlocks.length - 1));

    return {
      leftBlocks: allBlocks.slice(0, splitIndex),
      rightBlocks: allBlocks.slice(splitIndex),
    };
  }

  function renderExperienceSpreads(items = []) {
    track.innerHTML = items.map((item, index) => {
      const { leftBlocks, rightBlocks } = splitExperienceContent(item);
      const pageBase = index * 2;

      return `
        <section class="book-spread" data-spread="${index}">
          <article class="book-page left-page${index === 0 ? ' page-focus' : ''}" data-page-index="${pageBase}">
            <div class="page-inner">
              <h2 class="page-title">${escapeHtml(item['标题'] || '')}</h2>
              <div class="page-copy page-body">${renderContentBlocks(leftBlocks)}</div>
              <div class="page-number">Page ${(pageBase + 1).toString().padStart(2, '0')}</div>
            </div>
          </article>
          <div class="book-spine" aria-hidden="true"></div>
          <article class="book-page right-page" data-page-index="${pageBase + 1}">
            <div class="page-inner">
              <div class="page-kicker">${escapeHtml(item['时间与单位'] || '')}</div>
              <div class="page-top-tags">${renderTags(item['标签'] || [])}</div>
              <div class="page-copy page-body tight-top">${renderContentBlocks(rightBlocks)}</div>
              <div class="page-footer">
                ${buildSignoff(item['时间与单位'] || '')}
              </div>
              <div class="page-number">Page ${(pageBase + 2).toString().padStart(2, '0')}</div>
            </div>
          </article>
        </section>
      `;
    }).join('');

    refreshBookRefs();
  }

  function refreshBookRefs() {
    spreads = Array.from(document.querySelectorAll('.book-spread'));
    pageCards = Array.from(document.querySelectorAll('.book-page[data-page-index]'));
    totalSpreads = spreads.length;
  }

  async function hydrateExperienceContent() {
    try {
      const response = await fetch('/api/experience/content');
      if (!response.ok) return;
      const payload = await response.json();
      const content = payload.content || {};

      if (content['页面标题']) document.getElementById('experience-page-title').textContent = content['页面标题'];
      if (content['右侧标题']) document.getElementById('experience-side-label').textContent = content['右侧标题'];
      experienceItems = content['章节列表'] || [];
      renderExperienceSpreads(experienceItems);
      currentSpread = 0;
      focusedPage = 0;
      buildDots();
      updateControls();
      updateChapterState();
      updateSpreadLabel();
    } catch (error) {
      console.error('Failed to hydrate experience content:', error);
    }
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  hydrateExperienceContent();

  window.addEventListener('resize', () => {
    if (!experienceItems.length) return;
    window.clearTimeout(resizeTimer);
    resizeTimer = window.setTimeout(() => {
      const previousSpread = currentSpread;
      const previousPage = focusedPage;
      renderExperienceSpreads(experienceItems);
      currentSpread = Math.min(previousSpread, Math.max(0, totalSpreads - 1));
      focusedPage = Math.min(previousPage, Math.max(0, pageCards.length - 1));
      track.style.transform = `translateX(-${currentSpread * 100}%)`;
      buildDots();
      updateControls();
      updateChapterState();
      updateSpreadLabel();
    }, 120);
  });

  function buildDots() {
    dotsContainer.innerHTML = '';
    for (let i = 0; i < totalSpreads; i++) {
      const dot = document.createElement('button');
      dot.className = 'book-dot' + (i === 0 ? ' active' : '');
      dot.type = 'button';
      dot.setAttribute('aria-label', `Go to chapter ${i + 1}`);
      dot.addEventListener('click', () => goToSpread(i, i * 2));
      dotsContainer.appendChild(dot);
    }
  }

  function updateSpreadLabel() {
    spreadLabel.textContent = `Chapter ${(currentSpread + 1).toString().padStart(2, '0')} / ${String(totalSpreads).padStart(2, '0')}`;
  }

  function updateControls() {
    arrowLeft.disabled = currentSpread === 0;
    arrowRight.disabled = currentSpread === totalSpreads - 1;
    Array.from(document.querySelectorAll('.book-dot')).forEach((dot, index) => {
      dot.classList.toggle('active', index === currentSpread);
    });
  }

  function updateChapterState() {
    pageCards.forEach((page, index) => {
      page.classList.toggle('page-focus', index === focusedPage);
    });
  }

  function clearAnimationClasses() {
    spreads.forEach((spread) => {
      spread.classList.remove('turn-forward', 'turn-backward', 'pre-enter-right', 'pre-enter-left');
    });
  }

  function goToSpread(targetSpread, targetPage = targetSpread * 2) {
    if (isAnimating || targetSpread < 0 || targetSpread >= totalSpreads) return;

    focusedPage = Math.max(0, Math.min(targetPage, pageCards.length - 1));
    if (targetSpread === currentSpread) {
      updateChapterState();
      updateSpreadLabel();
      return;
    }

    isAnimating = true;
    const direction = targetSpread > currentSpread ? 'forward' : 'backward';
    const currentNode = spreads[currentSpread];
    const nextNode = spreads[targetSpread];

    nextNode.classList.add(direction === 'forward' ? 'pre-enter-right' : 'pre-enter-left');
    requestAnimationFrame(() => {
      currentNode.classList.add(direction === 'forward' ? 'turn-forward' : 'turn-backward');
    });

    setTimeout(() => {
      currentSpread = targetSpread;
      track.style.transform = `translateX(-${currentSpread * 100}%)`;
      updateControls();
      updateChapterState();
      updateSpreadLabel();

      requestAnimationFrame(() => {
        nextNode.classList.remove('pre-enter-right', 'pre-enter-left');
      });

      setTimeout(() => {
        clearAnimationClasses();
        isAnimating = false;
      }, 420);
    }, 280);
  }

  arrowLeft.addEventListener('click', () => goToSpread(currentSpread - 1, Math.max(0, currentSpread * 2 - 1)));
  arrowRight.addEventListener('click', () => goToSpread(currentSpread + 1, Math.min(pageCards.length - 1, currentSpread * 2 + 2)));

  document.addEventListener('keydown', (event) => {
    if (event.key === 'ArrowRight') goToSpread(currentSpread + 1, Math.min(pageCards.length - 1, currentSpread * 2 + 2));
    if (event.key === 'ArrowLeft') goToSpread(currentSpread - 1, Math.max(0, currentSpread * 2 - 1));
  });

  (() => {
    const wizard = document.getElementById('nav-wizard');
    const bubble = document.getElementById('wiz-bubble');
    const fig = document.getElementById('wiz-figure');
    const nav = wizard.parentElement;
    let chatTimer = null;
    let isCasting = false;
    const pendingTimers = new Set();

    function schedule(fn, delay) {
      const timer = window.setTimeout(() => {
        pendingTimers.delete(timer);
        fn();
      }, delay);
      pendingTimers.add(timer);
      return timer;
    }

    function clearPendingTimers() {
      pendingTimers.forEach((timer) => window.clearTimeout(timer));
      pendingTimers.clear();
    }

    function getLinkCenter(selector) {
      const el = nav.querySelector(selector);
      if (!el) return 200;
      const rect = el.getBoundingClientRect();
      const navRect = nav.getBoundingClientRect();
      return rect.left + rect.width / 2 - navRect.left - 14;
    }

    function say(text) {
      bubble.style.opacity = '0';
      schedule(() => {
        bubble.textContent = text;
        bubble.style.opacity = '1';
      }, 200);
    }

    function hideBubble() { bubble.style.opacity = '0'; }
    function moveTo(x) { wizard.classList.remove('idle'); wizard.style.left = x + 'px'; }
    function idle() { wizard.classList.add('idle'); }
    function poke() { wizard.classList.add('poking'); schedule(() => wizard.classList.remove('poking'), 500); }
    function face(dir) { fig.style.transform = dir < 0 ? 'scaleX(-1)' : 'scaleX(1)'; }
    function pointDir(dir) {
      wizard.classList.remove('point-right', 'point-left');
      if (dir > 0) wizard.classList.add('point-right');
      else if (dir < 0) wizard.classList.add('point-left');
    }
    function clearPoint() { wizard.classList.remove('point-right', 'point-left'); }

    const defaultChatLines = [
      { text: "这次是一本能左右翻的经历书。", action: 'idle' },
      { text: "一摊开就是两页，慢慢翻会更有感觉。", action: 'idle' },
      { text: "键盘左右键也能翻页，试试看。", action: 'idle' },
      { text: "左边目录点一下，会直接翻到对应章节。", action: 'idle' },
      { text: "想看作品的话，我也可以带你过去 👉", action: 'point', target: 'a[href=\"works.html\"]' },
      { text: "看完这本，再去 About 页收个尾吧。", action: 'point', target: 'a[href=\"about.html\"]' }
    ];
    const defaultCastLines = ["阿布拉卡达布拉…✨", "嗖～翻页传送启动！"];
    let chatLines = [...defaultChatLines];
    let castLines = [...defaultCastLines];
    const sequenceLineDelay = 4000;
    const sequenceReturnDelay = 2300;

    let lineIndex = 0;
    function collectPointSequence(startIndex, target) {
      const sequence = [];
      let cursor = startIndex;

      while (cursor < chatLines.length) {
        const current = chatLines[cursor];
        if (current.action !== 'point' || current.target !== target) break;
        sequence.push(current);
        cursor += 1;
      }

      return sequence;
    }

    function nextChat() {
      if (isCasting || lineIndex >= chatLines.length) return;
      const line = chatLines[lineIndex];
      lineIndex += 1;

      if (line.action === 'point' && line.target) {
        const sequence = collectPointSequence(lineIndex - 1, line.target);
        lineIndex = lineIndex - 1 + sequence.length;
        const pos = getLinkCenter(line.target);
        const currentLeft = parseFloat(wizard.style.left) || 0;
        face(pos > currentLeft ? 1 : -1);
        moveTo(pos);
        schedule(() => {
          idle();
          poke();
          pointDir(pos > currentLeft ? 1 : -1);
          sequence.forEach((item, index) => {
            schedule(() => {
              say(item.text);
            }, index * sequenceLineDelay);
          });
          schedule(() => {
            clearPoint();
            const homePos = getLinkCenter('a[href="experience.html"]');
            face(homePos < pos ? -1 : 1);
            moveTo(homePos);
            schedule(() => {
              idle();
              face(1);
            }, 1000);
          }, Math.max(sequenceReturnDelay, ((sequence.length - 1) * sequenceLineDelay) + sequenceReturnDelay));
        }, 1000);
        chatTimer = schedule(nextChat, 1000 + Math.max(sequenceReturnDelay, ((sequence.length - 1) * sequenceLineDelay) + sequenceReturnDelay) + 1800);
      } else {
        say(line.text);
        chatTimer = schedule(nextChat, 4200);
      }
    }

    function startWizard() {
      const pos = getLinkCenter('a[href="experience.html"]');
      wizard.style.transition = 'none';
      wizard.style.left = pos + 'px';
      face(1);
      idle();
      requestAnimationFrame(() => {
        wizard.style.transition = '';
      });
      chatTimer = schedule(nextChat, 500);
    }

    async function loadWizardContent() {
      try {
        const response = await fetch('/api/wizard/content');
        if (!response.ok) return;
        const payload = await response.json();
        const wizardContent = payload.content || {};
        const experienceContent = wizardContent.experience || {};
        if (Array.isArray(experienceContent['自动对话']) && experienceContent['自动对话'].length) {
          chatLines = experienceContent['自动对话'];
        }
        if (Array.isArray(experienceContent['施法文案']) && experienceContent['施法文案'].length >= 2) {
          castLines = experienceContent['施法文案'];
        }
      } catch (error) {
        console.error('Failed to hydrate experience wizard content:', error);
      }
    }

    schedule(() => {
      loadWizardContent().finally(startWizard);
    }, 300);

    nav.querySelectorAll('a[href]').forEach((link) => {
      const href = link.getAttribute('href');
      if (link.hasAttribute('download')) return;
      if (href === 'experience.html') return;
      link.addEventListener('click', (event) => {
        if (isCasting) {
          event.preventDefault();
          return;
        }
        event.preventDefault();
        isCasting = true;
        clearTimeout(chatTimer);
        clearPendingTimers();
        hideBubble();
        const targetPos = getLinkCenter(`a[href="${href}"]`);
        const currentLeft = parseFloat(wizard.style.left) || 0;
        face(targetPos > currentLeft ? 1 : -1);
        moveTo(targetPos);
        schedule(() => {
          idle();
          wizard.classList.add('casting');
          say(castLines[0] || defaultCastLines[0]);
          schedule(() => say(castLines[1] || defaultCastLines[1]), 600);
          schedule(() => {
            wizard.classList.remove('casting');
            window.location.href = href;
          }, 1400);
        }, 1000);
      });
    });
  })();
</script>
</body></html>
